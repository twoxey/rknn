<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        #message-container {
            max-height: 30em;
            overflow-y: auto;
        }
        #image-container {
            position: relative;
        }
        #image-container img {
            max-width: 100%;
            width: 600px;
        }
        #image-container canvas {
            position: absolute;
            top:0;
            left:0;
        }
    </style>
</head>
<body>
    <div id="image-container"></div>
    <button id="event-button"></button>
    <button id="image-button"></button>
    <pre id="stream-info"></pre>
    <div id="message-container"></div>
    <script>
        "use strict";
        const message_container = document.getElementById("message-container");
        const info_container = document.getElementById("stream-info");
        const event_button = document.getElementById("event-button");
        const image_button = document.getElementById("image-button");
        const image = image_init();

        let /** @type EventSource? */ event_source;

        event_button_reset();
        image_button_reset();

        function image_on_start() {
            image_button.innerText = "Stop Image";
            image_button.onclick = () => image.stop()
        }

        function image_on_stop() {
            image_button_reset()
        }

        function image_button_reset() {
            image_button.style.cursor = "pointer"
            image_button.innerText = "Start Image";
            image_button.onclick = () => image.start()
        }

        function event_button_reset() {
            event_button.style.cursor = "pointer"
            event_button.innerText = "Connect Event Source";
            event_button.onclick = () => event_source_connect();
        }

        function display_info(info) {
            let info_str = ""
            info_str += `camera frames: ${info.frame_count}\n`
            info_str += `sent frames:   ${info.sent_count}\n`
            info_str += `FPS:           ${info.fps}\n`
            info_str += `\n`
            info_str += `Detections:\n`
            for (const result of info.results) {
                info_str += `  ${result.class}:`.padEnd(12, " ")
                info_str += `(${result.minx} ${result.miny} ${result.maxx} ${result.maxy})`.padEnd(20, " ")
                info_str += `${(result.confidence*100).toFixed(1)}%\t\n`
            }
            info_container.innerText = info_str;
        }

        function event_source_on_stream_info(info) {
            display_info(info)
            image.draw_results(info.results);
        }

        function event_source_on_open(event) {
            append_message("[INFO] event source opened: " + JSON.stringify(event));
            event_button.innerText = "Close Event Source";
            event_button.onclick = () => event_source_close();
        }

        function event_source_on_error(err) {
            const pre = append_message("[Error] event source failed to connect: " + JSON.stringify(err));
            pre.style.color = 'red';
            event_source_on_close();
        }

        function event_source_on_close() {
            append_message("[INFO] event source closed");
            event_button_reset()
        }

        function event_source_connect() {
            if (!event_source) {
                event_source = new EventSource("/events");
                event_source.onmessage = event => {
                    append_message(event.data);
                };
                event_source.addEventListener("stream_info", event => {
                    const info = JSON.parse(event.data);
                    event_source_on_stream_info(info)
                });
                event_source.onopen = event_source_on_open
                event_source.onerror = event_source_on_error
            }
        }

        function event_source_close() {
            if (event_source) {
                event_source.close()
                event_source = undefined
                event_source_on_close();
            }
        }

        function append_message(message) {
            const pre = document.createElement("pre");
            message_container.append(pre);
            pre.innerText = message;
            message_container.scrollTop = message_container.scrollHeight;
            return pre;
        }

        const inference_results = [
            { class: "bus"    , minx: 95  , miny: 136 , maxx: 553 , maxy: 437, confidence: 0.944 },
            { class: "person" , minx: 108 , miny: 236 , maxx: 223 , maxy: 535, confidence: 0.890 },
            { class: "person" , minx: 211 , miny: 239 , maxx: 284 , maxy: 508, confidence: 0.843 },
            { class: "person" , minx: 477 , miny: 229 , maxx: 559 , maxy: 522, confidence: 0.827 },
            { class: "person" , minx: 79  , miny: 358 , maxx: 118 , maxy: 516, confidence: 0.490 },
        ];

        function image_init() {
            const image_container = document.getElementById("image-container");
            const img = new Image();
            const canvas = document.createElement("canvas");
            const context = canvas.getContext('2d');
            let current_results = [];

            requestAnimationFrame(function loop(time_stamp) {
                canvas.width = img.width;
                canvas.height = img.height;
                const w_ratio = canvas.width  / img.naturalWidth;
                const h_ratio = canvas.height / img.naturalHeight;
                context.clearRect(0, 0, canvas.width, canvas.height);
                context.lineWidth = 3
                context.strokeStyle = "blue"
                context.font = "16px monospace"
                context.fillStyle = "red"
                for (const result of current_results) {
                    const x = result.minx * w_ratio;
                    const y = result.miny * h_ratio;
                    const w = (result.maxx - result.minx) * w_ratio;
                    const h = (result.maxy - result.miny) * h_ratio;
                    context.strokeRect(x, y, w, h);
                    context.fillText(`${result.class} ${(result.confidence*100).toFixed(1)}%`, x, y);
                }
                requestAnimationFrame(loop)
            })

            image_container.append(img, canvas);

            function start() {
                img.src = "/camera";
                image_on_start()
            }

            function stop() {
                if (img.currentSrc) {
                    img.src = "";
                    image_on_stop()
                }
            }

            return {
                start,
                stop,
                draw_results(results) {
                    current_results = results;
                },
            }
        }
    </script>
</body>
</html>
